name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest
    name: ${{ matrix.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            sync-args: --extra dev
            test-command: uv run pytest -q -p no:cacheprovider
          - name: vector
            sync-args: --extra dev --extra vector
            test-command: uv run pytest tests/test_memory.py -q -p no:cacheprovider
          - name: stt
            sync-args: --extra dev --extra stt
            test-command: uv run pytest tests/test_stt.py -q -p no:cacheprovider
          - name: all
            sync-args: --extra dev --extra all
            test-command: uv run pytest -q -p no:cacheprovider

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync ${{ matrix.sync-args }}

      - name: Run tests
        run: ${{ matrix.test-command }}
